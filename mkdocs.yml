site_name: geomcore
site_description: A pure, standalone geometric kernel for CAD-grade curves and surfaces.
site_url: https://gabrieljms.github.io/geomcore/
repo_url: https://github.com/GabrielJMS/geomcore
repo_name: GabrielJMS/geomcore
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.footer
    - navigation.sections

# Local working documents live under docs/superpowers/ (git-ignored); never
# include them in the site.
exclude_docs: |
  superpowers/
  requirements.txt

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Tutorials:
      - Geometry basics: tutorials/geometry-basics.md
      - Curves and surfaces: tutorials/curves-and-surfaces.md
      - B-splines and NURBS: tutorials/bsplines.md
      - Curve-on-surface parametrization: tutorials/curve-on-surface.md
  - Migrating from NURBS-Python: migrating-from-geomdl.md
  - API overview: api.md
  - Validation: validation.md
  - Benchmarks: benchmarks.md
  - Development:
      - Releasing: releasing.md
  - Roadmap: https://github.com/GabrielJMS/geomcore/blob/main/ROADMAP.md
  - Changelog: https://github.com/GabrielJMS/geomcore/blob/main/CHANGELOG.md
